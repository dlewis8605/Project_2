<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AURA - Premium UX/UI Asset Catalog Log In">
  <title>AURA — Log In</title>
  
  <!-- PWA Manifest & Theme -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#a855f7">
  
  <!-- Bootstrap 4 & FontAwesome -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Offline Banner -->
  <div id="offline-banner" class="offline-banner">
    <i class="fas fa-wifi-slashmr-2"></i> You are currently offline. Running AURA in offline-only mode.
  </div>

  <div id="app">
    <!-- Glowing Background Orbs -->
    <div class="orb orb-primary"></div>
    <div class="orb orb-secondary"></div>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass">
      <div class="container">
        <a class="navbar-brand navbar-brand-glow" href="/index.html">AURA</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav mr-auto">
            <li class="nav-item">
              <a class="nav-link nav-link-custom" href="/index.html"><i class="fas fa-th-large mr-1"></i> Catalog</a>
            </li>
            <li class="nav-item" v-if="user">
              <a class="nav-link nav-link-custom" href="/favorites.html"><i class="fas fa-heart mr-1"></i> Favorites</a>
            </li>
          </ul>
          
          <div class="navbar-nav ml-auto align-items-center">
            <a href="/login.html" class="nav-link nav-link-custom active mr-2" v-if="!user">
              Log In
            </a>
            <a href="/register.html" class="nav-link nav-link-custom" v-if="!user">
              Sign Up
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Auth Container -->
    <main class="container py-5 my-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="glass-panel">
            <h2 class="text-center text-light mb-4">Log In to <span class="gradient-text">AURA</span></h2>
            
            <!-- Real-time Alerts -->
            <div v-if="authError" class="alert alert-glass mb-4" role="alert">
              <i class="fas fa-exclamation-triangle mr-2"></i> {{ authError }}
            </div>

            <!-- Login Form -->
            <form @submit="loginUser">
              <div class="form-group mb-4">
                <label for="loginIdentifier" class="form-glass-label">Username or Email</label>
                <input type="text" id="loginIdentifier" v-model="authIdentifier" class="form-control form-glass-input" required placeholder="Enter username or email">
              </div>
              
              <div class="form-group mb-4">
                <label for="password" class="form-glass-label">Password</label>
                <input type="password" id="password" v-model="authPassword" class="form-control form-glass-input" required placeholder="Enter password">
              </div>
              
              <button type="submit" class="form-btn-submit mt-2">Log In</button>
            </form>
            
            <p class="text-center text-muted mt-4 mb-0">
              Don't have an account? <a href="/register.html" class="gradient-text-accent font-weight-bold" style="text-decoration:none;">Sign Up here</a>
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- Toast Notification Banner -->
    <div class="copy-toast" :class="{ show: showToast }">
      <i class="fas fa-check-circle"></i> {{ toastMessage }}
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 fixed-bottom border-top" style="border-color: rgba(255,255,255,0.05) !important;">
      <p class="text-muted m-0">AURA Catalog &copy; 2026. Built by Darell Lewis for Web Development II.</p>
    </footer>
  </div>

  <!-- jQuery, Popper, Bootstrap, Vue.js (CDN Integrations) -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  
  <!-- PWA Logic Registration -->
  <script src="/js/pwa.js"></script>
  
  <!-- Main Frontend Vue Logic -->
  <script src="/js/app.js"></script>

</body>
</html>
